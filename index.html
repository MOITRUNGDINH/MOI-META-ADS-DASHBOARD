<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Ads Dashboard - Multi-File Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .stat-value { font-size: 1.8rem; font-weight: bold; color: #1e40af; }
    </style>
</head>
<body class="bg-gray-50 p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">Báo Cáo Meta Ads</h1>
                <p id="lastUpdated" class="text-sm text-gray-500 italic">Đang tải dữ liệu...</p>
            </div>
            <div id="loadingStatus" class="px-4 py-2 bg-blue-100 text-blue-700 rounded-full text-sm font-medium animate-pulse">
                Đang nạp dữ liệu từ GitHub...
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="card border-t-4 border-blue-500">
                <p class="text-gray-500 text-sm">Tổng Chi Phí</p>
                <p id="totalSpend" class="stat-value">0</p>
            </div>
            <div class="card border-t-4 border-green-500">
                <p class="text-gray-500 text-sm">Hiển Thị (Imp)</p>
                <p id="totalImp" class="stat-value">0</p>
            </div>
            <div class="card border-t-4 border-yellow-500">
                <p class="text-gray-500 text-sm">Số Click</p>
                <p id="totalClicks" class="stat-value">0</p>
            </div>
            <div class="card border-t-4 border-purple-500">
                <p class="text-gray-500 text-sm">CPC Trung Bình</p>
                <p id="avgCPC" class="stat-value">0</p>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-8">
            <div class="card">
                <h2 class="text-xl font-semibold mb-4 text-gray-700">Biểu đồ chi phí theo ngày</h2>
                <div class="h-[400px]">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Cấu hình định dạng tiền tệ
        const fmt = new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' });

        async function boot() {
            try {
                // 1. Tải file mục lục (data.json)
                const resp = await fetch('data.json?t=' + Date.now());
                if (!resp.ok) throw new Error("Không tìm thấy file data.json");
                const index = await resp.json();
                
                document.getElementById('lastUpdated').innerText = `Cập nhật lần cuối: ${new Date(index.last_updated).toLocaleString('vi-VN')}`;

                let fullData = [];

                // 2. Logic gộp file: Nếu có danh sách months, tải từng file data-YYYY-MM.json
                if (index.months && index.months.length > 0) {
                    console.log("Phát hiện cấu trúc đa tệp. Đang tải các tháng:", index.months);
                    
                    const fetchPromises = index.months.map(month => 
                        fetch(`data-${month}.json?t=${Date.now()}`).then(r => r.ok ? r.json() : [])
                    );
                    
                    const results = await Promise.all(fetchPromises);
                    results.forEach(monthData => {
                        fullData = fullData.concat(monthData);
                    });
                } else {
                    // Dự phòng cho dữ liệu cũ (file đơn)
                    fullData = index.ad_daily || [];
                }

                if (fullData.length === 0) {
                    document.getElementById('loadingStatus').innerText = "❌ Không có dữ liệu";
                    document.getElementById('loadingStatus').className = "px-4 py-2 bg-red-100 text-red-700 rounded-full text-sm";
                    return;
                }

                // 3. Xử lý hiển thị
                renderDashboard(fullData);
                document.getElementById('loadingStatus').style.display = 'none';

            } catch (err) {
                console.error("Lỗi:", err);
                document.getElementById('loadingStatus').innerText = "❌ Lỗi tải dữ liệu";
                document.getElementById('loadingStatus').className = "px-4 py-2 bg-red-100 text-red-700 rounded-full text-sm";
            }
        }

        function renderDashboard(data) {
            // Sắp xếp data theo ngày tăng dần
            data.sort((a, b) => new Date(a.date_start) - new Date(b.date_start));

            // Nhóm dữ liệu theo ngày để vẽ biểu đồ
            const dailyMap = {};
            let totalSpend = 0, totalImp = 0, totalClicks = 0;

            data.forEach(item => {
                const d = item.date_start;
                const s = parseFloat(item.spend || 0);
                const i = parseInt(item.impressions || 0);
                const c = parseInt(item.clicks || 0);

                if (!dailyMap[d]) dailyMap[d] = 0;
                dailyMap[d] += s;

                totalSpend += s;
                totalImp += i;
                totalClicks += c;
            });

            // Update KPIs
            document.getElementById('totalSpend').innerText = fmt.format(totalSpend);
            document.getElementById('totalImp').innerText = totalImp.toLocaleString();
            document.getElementById('totalClicks').innerText = totalClicks.toLocaleString();
            document.getElementById('avgCPC').innerText = totalClicks > 0 ? fmt.format(totalSpend / totalClicks) : '0 ₫';

            // Vẽ biểu đồ
            const ctx = document.getElementById('mainChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Object.keys(dailyMap),
                    datasets: [{
                        label: 'Chi phí (VND)',
                        data: Object.values(dailyMap),
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, ticks: { callback: v => v.toLocaleString() } }
                    }
                }
            });
        }

        // Khởi động
        boot();
    </script>
</body>
</html>
