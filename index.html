<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Ads Dashboard Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8 border-b pb-6">
            <h1 class="text-3xl font-bold text-slate-800">Báo Cáo Facebook Ads</h1>
            <p id="lastUpdated" class="text-slate-500 italic mt-2">Đang nạp dữ liệu...</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-500">
                <p class="text-sm text-slate-500 font-medium uppercase">Tổng Chi Phí</p>
                <p id="totalSpend" class="text-2xl font-bold text-slate-800">0 ₫</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-emerald-500">
                <p class="text-sm text-slate-500 font-medium uppercase">Lượt Hiển Thị</p>
                <p id="totalImp" class="text-2xl font-bold text-slate-800">0</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-amber-500">
                <p class="text-sm text-slate-500 font-medium uppercase">Lượt Click</p>
                <p id="totalClicks" class="text-2xl font-bold text-slate-800">0</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-rose-500">
                <p class="text-sm text-slate-500 font-medium uppercase">CTR Trung Bình</p>
                <p id="avgCTR" class="text-2xl font-bold text-slate-800">0%</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm mb-8">
            <h2 class="text-lg font-bold text-slate-700 mb-6">Biểu Đồ Tăng Trưởng Chi Phí Theo Ngày</h2>
            <div class="h-[400px]">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const fmt = new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' });

        async function init() {
            try {
                // 1. Đọc file mục lục
                const resIndex = await fetch('data.json?v=' + Date.now());
                const index = await resIndex.json();
                
                document.getElementById('lastUpdated').innerText = `Cập nhật cuối: ${new Date(index.last_updated).toLocaleString('vi-VN')}`;

                let combinedData = [];

                // 2. Tải tất cả các file tháng song song
                if (index.months && index.months.length > 0) {
                    const tasks = index.months.map(m => 
                        fetch(`data-${m}.json?v=` + Date.now()).then(r => r.ok ? r.json() : [])
                    );
                    const chunks = await Promise.all(tasks);
                    chunks.forEach(data => combinedData = combinedData.concat(data));
                }

                if (combinedData.length === 0) {
                    document.getElementById('lastUpdated').innerText = "❌ Không tìm thấy dữ liệu trong các file tháng!";
                    return;
                }

                render(combinedData);

            } catch (e) {
                console.error(e);
                document.getElementById('lastUpdated').innerText = "❌ Lỗi kết nối dữ liệu GitHub.";
            }
        }

        function render(data) {
            // Sắp xếp theo ngày
            data.sort((a, b) => new Date(a.date_start) - new Date(b.date_start));

            const daily = {};
            let spend = 0, imp = 0, click = 0;

            data.forEach(i => {
                const day = i.date_start;
                const s = parseFloat(i.spend || 0);
                const im = parseInt(i.impressions || 0);
                const cl = parseInt(i.clicks || 0);

                daily[day] = (daily[day] || 0) + s;
                spend += s;
                imp += im;
                click += cl;
            });

            // Update UI
            document.getElementById('totalSpend').innerText = fmt.format(spend);
            document.getElementById('totalImp').innerText = imp.toLocaleString();
            document.getElementById('totalClicks').innerText = click.toLocaleString();
            document.getElementById('avgCTR').innerText = imp > 0 ? ((click / imp) * 100).toFixed(2) + '%' : '0%';

            // Vẽ Chart
            new Chart(document.getElementById('mainChart'), {
                type: 'line',
                data: {
                    labels: Object.keys(daily),
                    datasets: [{
                        label: 'Chi phí hàng ngày',
                        data: Object.values(daily),
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.05)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            ticks: { callback: v => v.toLocaleString() + ' ₫' },
                            grid: { borderDash: [5, 5] }
                        },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        init();
    </script>
</body>
</html>
